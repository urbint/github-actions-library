name: "Aurora RDS Backup"
description: "Takes a backup (snapshot) of a specified RDS cluster or instance based on the environment using Workload Identity Federation. ⚠️ REQUIRED: The calling workflow MUST include permissions: id-token: write and contents: read at the job or workflow level. See README for details."
inputs:
  environment:
    description: "Environment (integ, staging, prod)"
    required: true
    type: string
    options:
      - integ
      - staging
      - prod
  rds_identifier:
    description: "Identifier of the RDS cluster or instance to backup"
    required: true
    type: string
  rds_backup_description:
    description: "Description of the RDS backup snapshot"
    required: true
    type: string
  iam_role_arn:
    description: "IAM Role ARN for Workload Identity Federation (e.g., arn:aws:iam::123456789012:role/github-actions-role)"
    required: true
    type: string
  aws_region:
    description: "AWS Region (e.g., us-east-1)"
    required: true
    type: string
runs:
  using: "composite"
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.iam_role_arn }}
        aws-region: ${{ inputs.aws_region }}
        role-session-name: github-actions-rds-backup
        # `audience` is optional; if you set it, make sure it matches trust policy
        audience: sts.amazonaws.com
        output-env-credentials: true

    - name: Set up AWS CLI
      shell: bash
      run: |
        aws --version

    - name: Take RDS Backup
      shell: bash
      run: |
        RDS_IDENTIFIER="${{ inputs.rds_identifier }}"
        AWS_REGION="${{ inputs.aws_region }}"
        
        echo "Checking if $RDS_IDENTIFIER is a cluster or instance..."
        
        # Try cluster first
        if aws rds describe-db-clusters --db-cluster-identifier "$RDS_IDENTIFIER" --region "$AWS_REGION" 2>/dev/null; then
          echo "Found RDS cluster: $RDS_IDENTIFIER"
          SNAPSHOT_ID="${RDS_IDENTIFIER}-snapshot-$(date +%Y%m%d-%H%M%S)"
          aws rds create-db-cluster-snapshot \
            --db-cluster-identifier "$RDS_IDENTIFIER" \
            --db-cluster-snapshot-identifier "$SNAPSHOT_ID" \
            --region "$AWS_REGION" \
            --tags Key=Environment,Value=${{ inputs.environment }} Key=Description,Value="${{ inputs.rds_backup_description }}"
          echo "Created cluster snapshot: $SNAPSHOT_ID"
        # Try instance
        elif aws rds describe-db-instances --db-instance-identifier "$RDS_IDENTIFIER" --region "$AWS_REGION" 2>/dev/null; then
          echo "Found RDS instance: $RDS_IDENTIFIER"
          SNAPSHOT_ID="${RDS_IDENTIFIER}-snapshot-$(date +%Y%m%d-%H%M%S)"
          aws rds create-db-snapshot \
            --db-instance-identifier "$RDS_IDENTIFIER" \
            --db-snapshot-identifier "$SNAPSHOT_ID" \
            --region "$AWS_REGION" \
            --tags Key=Environment,Value=${{ inputs.environment }} Key=Description,Value="${{ inputs.rds_backup_description }}"
          echo "Created instance snapshot: $SNAPSHOT_ID"
        else
          echo "Error: RDS cluster or instance '$RDS_IDENTIFIER' not found"
          exit 1
        fi

    