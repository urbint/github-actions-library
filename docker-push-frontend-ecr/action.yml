name: 'Docker Push Frontend to ECR'
description: 'Builds a frontend application and pushes a Docker image to Amazon Elastic Container Registry using Workload Identity Federation. ⚠️ REQUIRED: The calling workflow MUST include permissions: id-token: write and contents: read at the job or workflow level.'
inputs:
  tag:
    description: 'Tag for the Docker image (e.g., latest or commit SHA)'
    required: true
  aws_account_id:
    description: 'AWS Account ID'
    required: true
  aws_region:
    description: 'AWS Region (e.g., us-east-1)'
    required: true
  iam_role_arn:
    description: 'IAM Role ARN for Workload Identity Federation (e.g., arn:aws:iam::123456789012:role/github-actions-role)'
    required: true
  ecr_repository:
    description: 'ECR repository name'
    required: true
  dockerfile:
    description: 'Path to the Dockerfile (default: Dockerfile)'
    required: false
    default: 'Dockerfile'
  node-version:
    description: 'Node.js version to use'
    required: true
    default: '20'
  registry-url:
    description: 'Registry URL for NPM packages'
    required: true
  node-auth-token:
    description: 'NPM Auth Token for accessing private packages'
    required: true
    default: ''
  target:
    description: 'Optional build target for the Docker image'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.iam_role_arn }}
        aws-region: ${{ inputs.aws_region }}
        role-session-name: github-actions-ecr
        # `audience` is optional; if you set it, make sure it matches trust policy
        audience: sts.amazonaws.com
        output-env-credentials: true

    - name: Login to Amazon ECR
      run: |
        aws ecr get-login-password --region ${{ inputs.aws_region }} \
          | docker login \
            --username AWS \
            --password-stdin ${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com
      shell: bash

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: ${{ inputs.registry-url }}

    - name: Install dependencies
      run: |
        yarn install
      env:
        NODE_AUTH_TOKEN: ${{ inputs.node-auth-token }}
      shell: bash

    - name: Build the application
      run: |
        yarn build
      shell: bash

    - name: Build and Push Docker Image (No Target)
      if: ${{ !inputs.target }}
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        push: true
        tags: ${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com/${{ inputs.ecr_repository }}:${{ inputs.tag }}

    - name: Build and Push Docker Image (With Target)
      if: ${{ inputs.target }}
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        push: true
        tags: ${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com/${{ inputs.ecr_repository }}:${{ inputs.tag }}
        target: ${{ inputs.target }}

